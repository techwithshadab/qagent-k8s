# k8s/base/agents.yaml
# Deployment + Service for every agent pod.
# Each agent runs in its own pod — one process per container (12-factor app).
#
# Resource requests/limits are intentionally modest for local (kind/minikube) use.
# Scale up for production.
---
# ─────────────────────────────────────────────
# Orchestrator
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: orchestrator
  namespace: qagent
  labels:
    app: orchestrator
    role: coordinator
    app.kubernetes.io/part-of: qagent-k8s
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orchestrator
  template:
    metadata:
      labels:
        app: orchestrator
        role: coordinator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # BEST PRACTICE: Use a dedicated ServiceAccount per agent
      serviceAccountName: qagent-sa
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: gcp-sa-key
      containers:
        - name: orchestrator
          image: qagent/orchestrator:latest
          imagePullPolicy: IfNotPresent   # local cluster — image built with kind load
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: qagent-config
            - secretRef:
                name: qagent-secrets
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /app/secrets
              readOnly: true
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          # BEST PRACTICE: Read-only root filesystem where possible
          securityContext:
            readOnlyRootFilesystem: false   # needs tmp for uvicorn
            runAsNonRoot: true
            runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: orchestrator-svc
  namespace: qagent
  labels:
    app: orchestrator
    app.kubernetes.io/part-of: qagent-k8s
spec:
  selector:
    app: orchestrator
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  type: ClusterIP

