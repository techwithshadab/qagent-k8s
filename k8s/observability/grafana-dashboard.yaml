---
# Grafana Dashboard — QAgent Multi-Agent Pipeline
# This ConfigMap is auto-loaded by the Grafana sidecar (label: grafana_dashboard=1).
# Deployed to namespace `monitoring` alongside kube-prometheus-stack.
apiVersion: v1
kind: ConfigMap
metadata:
  name: qagent-grafana-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  qagent-dashboard.json: |
    {
      "title": "QAgent Multi-Agent Pipeline",
      "uid": "qagent-k8s-v1",
      "tags": ["qagent", "kubernetes", "ai"],
      "timezone": "browser",
      "schemaVersion": 37,
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Request Rate per Agent (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (agent) (rate(qagent_agent_requests_total{status=\"success\"}[2m]))",
              "legendFormat": "{{agent}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "id": 2,
          "title": "Error Rate per Agent (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (agent) (rate(qagent_agent_requests_total{status=\"error\"}[2m]))",
              "legendFormat": "{{agent}} errors",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "color": { "fixedColor": "red", "mode": "fixed" },
              "custom": { "lineWidth": 2, "fillOpacity": 10 }
            }
          }
        },
        {
          "id": 3,
          "title": "P99 Request Latency per Agent (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (agent, le) (rate(qagent_agent_duration_seconds_bucket[2m])))",
              "legendFormat": "p99 {{agent}}",
              "refId": "A"
            },
            {
              "expr": "histogram_quantile(0.50, sum by (agent, le) (rate(qagent_agent_duration_seconds_bucket[2m])))",
              "legendFormat": "p50 {{agent}}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2, "fillOpacity": 5 }
            }
          }
        },
        {
          "id": 4,
          "title": "LLM Tier Usage",
          "type": "piechart",
          "gridPos": { "x": 12, "y": 8, "w": 6, "h": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (tier) (qagent_llm_requests_total)",
              "legendFormat": "{{tier}}",
              "refId": "A"
            }
          ],
          "options": {
            "pieType": "donut",
            "legend": { "displayMode": "list", "placement": "bottom" }
          }
        },
        {
          "id": 5,
          "title": "LLM Fallbacks Fired",
          "type": "stat",
          "gridPos": { "x": 18, "y": 8, "w": 6, "h": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (to_tier) (increase(qagent_llm_fallbacks_total[5m]))",
              "legendFormat": "→ {{to_tier}}",
              "refId": "A"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 6,
          "title": "A2A Call Latency P99 by Route (s)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (from_agent, to_agent, le) (rate(qagent_a2a_duration_seconds_bucket[2m])))",
              "legendFormat": "{{from_agent}}→{{to_agent}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 7,
          "title": "A2A Call Rate by Route (req/s)",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 16, "w": 12, "h": 8 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (from_agent, to_agent, action) (rate(qagent_a2a_requests_total{status=\"success\"}[2m]))",
              "legendFormat": "{{from_agent}}→{{to_agent}}/{{action}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 8,
          "title": "Coder Agent Replicas (HPA)",
          "type": "stat",
          "gridPos": { "x": 0, "y": 24, "w": 6, "h": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "kube_deployment_status_replicas_ready{namespace=\"qagent\", deployment=\"coder-agent\"}",
              "legendFormat": "ready",
              "refId": "A"
            },
            {
              "expr": "kube_deployment_spec_replicas{namespace=\"qagent\", deployment=\"coder-agent\"}",
              "legendFormat": "desired",
              "refId": "B"
            }
          ],
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] } },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 4 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          }
        },
        {
          "id": 9,
          "title": "Pod Restart Rate (qagent namespace)",
          "type": "timeseries",
          "gridPos": { "x": 6, "y": 24, "w": 12, "h": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "sum by (pod) (rate(kube_pod_container_status_restarts_total{namespace=\"qagent\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 10,
          "title": "LLM Call Duration P99 per Tier (s)",
          "type": "timeseries",
          "gridPos": { "x": 18, "y": 24, "w": 6, "h": 6 },
          "datasource": { "type": "prometheus" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum by (tier, le) (rate(qagent_llm_duration_seconds_bucket[5m])))",
              "legendFormat": "p99 {{tier}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 2 }
            }
          }
        }
      ]
    }
