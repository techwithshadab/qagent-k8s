# kind-cluster.yaml
# ==================
# Kind cluster configuration for the QAgent-K8s workshop.
# Creates a 3-node cluster (1 control-plane + 2 workers) with
# port mappings for direct access without kubectl port-forward.
#
# Usage:
#   kind create cluster --name qagent-workshop --config kind-cluster.yaml
#
# The extra port mappings (8000-8004) allow direct curl from localhost
# if you choose to use NodePort services instead of port-forward.
---
kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: qagent-workshop

nodes:
  - role: control-plane
    # Extra port mappings for direct node access (optional)
    # Useful if participants prefer not to use port-forward
    extraPortMappings:
      - containerPort: 30000
        hostPort: 8000
        protocol: TCP
      - containerPort: 30001
        hostPort: 8001
        protocol: TCP
      - containerPort: 30002
        hostPort: 8002
        protocol: TCP
      - containerPort: 30003
        hostPort: 8003
        protocol: TCP
      - containerPort: 30004
        hostPort: 8004
        protocol: TCP
      - containerPort: 30080
        hostPort: 30080
        protocol: TCP

  - role: worker
    # Label worker nodes for scheduling awareness
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=worker"

  - role: worker
    kubeadmConfigPatches:
      - |
        kind: JoinConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "node-role=worker"

# Networking — use kindest/node default (no CNI swap needed for basic NetworkPolicy in kind)
networking:
  # Disable default CNI to use Calico for full NetworkPolicy support
  # Comment this out if you don't need NetworkPolicy enforcement
  # disableDefaultCNI: true
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
