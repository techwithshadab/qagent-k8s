<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QAgent-K8s</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: 0.02em; }
    header .subtitle { font-size: 0.75rem; color: #8892b0; }

    #feed {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .empty-state {
      margin: auto;
      text-align: center;
      color: #8892b0;
    }
    .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
    .empty-state p { font-size: 0.95rem; }

    /* Input bar */
    .input-bar {
      background: #fff;
      border-top: 1px solid #e2e8f0;
      padding: 16px 24px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    textarea {
      flex: 1;
      border: 1px solid #cbd5e0;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 52px;
      max-height: 160px;
      line-height: 1.5;
      transition: border-color 0.15s;
    }
    textarea:focus { border-color: #4a90d9; }

    button#runBtn {
      background: #1a1a2e;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 22px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
      height: 52px;
    }
    button#runBtn:hover { background: #2d2d5e; }
    button#runBtn:disabled { background: #a0aec0; cursor: not-allowed; }

    /* Message cards */
    .msg-user {
      align-self: flex-end;
      background: #1a1a2e;
      color: #e2e8f0;
      border-radius: 14px 14px 4px 14px;
      padding: 12px 18px;
      max-width: 70%;
      font-size: 0.95rem;
      line-height: 1.5;
    }

    .msg-agent {
      align-self: flex-start;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .card-header {
      padding: 12px 16px;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 8px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .card-body { padding: 14px 16px; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 99px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-low    { background: #c6f6d5; color: #276749; }
    .badge-medium { background: #fefcbf; color: #744210; }
    .badge-high   { background: #fed7d7; color: #822727; }
    .badge-ok     { background: #c6f6d5; color: #276749; }
    .badge-warn   { background: #fed7d7; color: #822727; }

    .task-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
    .task-list li {
      font-size: 0.85rem;
      color: #4a5568;
      padding: 6px 10px;
      background: #f8fafc;
      border-radius: 6px;
      border-left: 3px solid #4a90d9;
    }
    .task-list li strong { color: #1a1a2e; }

    .result-card { }
    .result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      font-size: 0.82rem;
      color: #718096;
      margin-bottom: 10px;
    }
    .score { font-weight: 600; color: #2d3748; }

    .strategy-block {
      font-size: 0.83rem;
      color: #4a5568;
      line-height: 1.6;
      background: #f8fafc;
      border-left: 3px solid #4a90d9;
      padding: 8px 12px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 12px;
    }

    .code-wrap { position: relative; }
    .lang-label {
      position: absolute;
      top: 8px;
      right: 10px;
      font-size: 0.7rem;
      color: #a0aec0;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    pre {
      background: #1e2130;
      color: #cdd6f4;
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-size: 0.82rem;
      line-height: 1.6;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
    }

    .review-toggle {
      margin-top: 10px;
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 0.8rem;
      color: #4a5568;
      cursor: pointer;
      width: 100%;
      text-align: left;
    }
    .review-toggle:hover { background: #f8fafc; }
    .review-details {
      display: none;
      margin-top: 8px;
      font-size: 0.82rem;
      color: #4a5568;
      line-height: 1.6;
      background: #f8fafc;
      padding: 10px 12px;
      border-radius: 6px;
    }
    .review-details.open { display: block; }
    .issues-list { margin-top: 6px; padding-left: 16px; color: #e53e3e; }

    /* Spinner */
    .spinner-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #718096;
      font-size: 0.85rem;
      padding: 8px 0;
    }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid #e2e8f0;
      border-top-color: #4a90d9;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      background: #fff5f5;
      border: 1px solid #fed7d7;
      color: #c53030;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 0.875rem;
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>QAgent-K8s</h1>
    <div class="subtitle">Multi-agent AI · Kubernetes</div>
  </div>
</header>

<div id="feed">
  <div class="empty-state" id="emptyState">
    <div class="icon">🤖</div>
    <p>Describe what you'd like the agents to build.</p>
  </div>
</div>

<div class="input-bar">
  <textarea id="input" placeholder="e.g. Write a Python function that reads a CSV and returns summary statistics…" rows="1"></textarea>
  <button id="runBtn" onclick="submit()">Run ▶</button>
</div>

<script>
  const feed = document.getElementById('feed');
  const input = document.getElementById('input');
  const runBtn = document.getElementById('runBtn');
  const emptyState = document.getElementById('emptyState');

  // Auto-resize textarea
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });

  // Submit on Ctrl+Enter / Cmd+Enter
  input.addEventListener('keydown', e => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') submit();
  });

  function hideEmpty() {
    if (emptyState) emptyState.style.display = 'none';
  }

  function scrollBottom() {
    feed.scrollTop = feed.scrollHeight;
  }

  function badgeComplexity(c) {
    const cls = { low: 'badge-low', medium: 'badge-medium', high: 'badge-high' }[c] || 'badge-medium';
    return `<span class="badge ${cls}">${c}</span>`;
  }

  function renderPlanCard(plan) {
    const tasks = (plan.tasks || []).map(t =>
      `<li><strong>${t.id}</strong> — ${escHtml(t.description)}</li>`
    ).join('');
    return `
      <div class="card">
        <div class="card-header">📋 Plan ${badgeComplexity(plan.complexity || 'medium')}</div>
        <div class="card-body">
          <p style="font-size:0.88rem;color:#4a5568;margin-bottom:12px">${escHtml(plan.summary || '')}</p>
          <ul class="task-list">${tasks}</ul>
        </div>
      </div>`;
  }

  function renderResultCard(r) {
    const approved = r.approved !== false;
    const badge = approved
      ? '<span class="badge badge-ok">✅ Approved</span>'
      : '<span class="badge badge-warn">⚠️ Needs review</span>';
    const score = r.review && r.review.score != null
      ? `<span class="score">Score: ${r.review.score}/10</span>` : '';
    const strategy = r.strategy
      ? `<div class="strategy-block">${escHtml(r.strategy)}</div>` : '';
    const code = r.code
      ? `<div class="code-wrap">
           <span class="lang-label">${escHtml(r.language || 'python')}</span>
           <pre>${escHtml(r.code)}</pre>
         </div>` : '';

    let reviewHtml = '';
    if (r.review) {
      const feedback = escHtml(r.review.feedback || '');
      const issues = (r.review.issues || []).map(i => `<li>${escHtml(i)}</li>`).join('');
      const issuesBlock = issues ? `<ul class="issues-list">${issues}</ul>` : '';
      reviewHtml = `
        <button class="review-toggle" onclick="toggleReview(this)">▸ Review feedback</button>
        <div class="review-details">${feedback}${issuesBlock}</div>`;
    }

    return `
      <div class="card result-card">
        <div class="card-header">
          Task ${escHtml(r.task_id || '')} ${badge} ${score}
        </div>
        <div class="card-body">
          ${strategy}${code}${reviewHtml}
        </div>
      </div>`;
  }

  function toggleReview(btn) {
    const details = btn.nextElementSibling;
    details.classList.toggle('open');
    btn.textContent = details.classList.contains('open')
      ? '▾ Review feedback' : '▸ Review feedback';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function submit() {
    const text = input.value.trim();
    if (!text || runBtn.disabled) return;

    hideEmpty();

    // User message
    const userDiv = document.createElement('div');
    userDiv.className = 'msg-user';
    userDiv.textContent = text;
    feed.appendChild(userDiv);

    // Spinner
    const spinDiv = document.createElement('div');
    spinDiv.className = 'spinner-wrap';
    spinDiv.innerHTML = '<div class="spinner"></div><span>Agents working…</span>';
    feed.appendChild(spinDiv);

    input.value = '';
    input.style.height = 'auto';
    runBtn.disabled = true;
    scrollBottom();

    try {
      const resp = await fetch('/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_request: text }),
      });

      spinDiv.remove();

      if (!resp.ok) {
        const errDiv = document.createElement('div');
        errDiv.className = 'error-msg';
        errDiv.textContent = `Error ${resp.status}: ${resp.statusText}`;
        feed.appendChild(errDiv);
      } else {
        const data = await resp.json();
        const agentDiv = document.createElement('div');
        agentDiv.className = 'msg-agent';

        let html = renderPlanCard(data.plan || {});
        for (const r of (data.results || [])) {
          html += renderResultCard(r);
        }
        agentDiv.innerHTML = html;
        feed.appendChild(agentDiv);
      }
    } catch (err) {
      spinDiv.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'error-msg';
      errDiv.textContent = 'Network error: ' + err.message;
      feed.appendChild(errDiv);
    }

    runBtn.disabled = false;
    scrollBottom();
  }
</script>
</body>
</html>
